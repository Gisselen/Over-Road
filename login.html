<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imagens/iconn.ico" type="image/x-icon">
    <title>Login</title>
  
    <style>
       section.Login{
            
            margin: auto;
            width: 530px;
            height: 240px;
           
            text-align: center;
            color:white;
           background-color: rgba(0, 0, 0, 0.747);
          
            top: 30%;

     }
     .card{
        
        padding:30px;
        width: 530px;
        height: 400px;
       
        
     }
    section.Login input{
       font-size: 17px;
       align-items: center;
       margin-top: 2rem;
        color:rgb(0, 0, 0);


     }
     
     section.Login h3{
        font-size: 40px;
     }
    </style>

</head>


<body>

    <section>
        <div class="background-login">
            <video src="imagens/background-login.mp4" autoplay loop muted></video>
        </div>
    

 <section class="Login" id="Login">


       <div class="card">
         <h3>Login</h3>
       

        <div class="inputlogin">
        <input type="text" placeholder="Login" id="login">
        <input type="password" placeholder="Senha" id="senha">
        <input type="submit" onclick="logar()">
        </div>
         <br> <br>
        <p>Não tem uma conta? <a href="#"> Casdastre-se</a></p> 
        
    </div>
         </div>
        
</section>

</section>


<script>
function logar() {

    var login = document.getElementById('login').value;
    var senha = document.getElementById('senha').value;
    
    if(login == "admin" && senha == "admin"){
        alert('Sucesso');
    }
    else{
        alert("Usuario ou senha incorretos");
    }

}

</script>




</body>
</html>
